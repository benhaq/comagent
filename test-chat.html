<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComAgent Chat Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    #config { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #config label { font-size: 13px; color: #aaa; }
    #config input { background: #0f3460; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
    #config input[name="jwt"] { flex: 1; min-width: 200px; }
    #config input[name="url"] { width: 280px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { background: #0f3460; align-self: flex-end; }
    .msg.assistant { background: #222; align-self: flex-start; border: 1px solid #333; }
    .msg.tool { background: #1a2a1a; align-self: flex-start; border: 1px solid #2a4a2a; font-size: 12px; font-family: monospace; }
    .msg.error { background: #3a1a1a; border: 1px solid #4a2a2a; align-self: center; color: #f88; }
    .msg.system { background: transparent; align-self: center; color: #888; font-size: 12px; }
    #input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 8px; }
    #input-area input { flex: 1; background: #0f3460; border: 1px solid #444; color: #eee; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
    #input-area input:focus { border-color: #5588ff; }
    #input-area button { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #input-area button:hover { background: #c73850; }
    #input-area button:disabled { background: #555; cursor: not-allowed; }
    #debug-toggle { position: fixed; top: 8px; right: 12px; background: #333; color: #aaa; border: 1px solid #555; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; z-index: 10; }
    #debug-panel { display: none; position: fixed; right: 0; top: 32px; bottom: 0; width: 400px; background: #111; border-left: 1px solid #333; overflow-y: auto; padding: 8px; font-family: monospace; font-size: 11px; color: #8f8; z-index: 9; }
    #debug-panel.open { display: block; }
    .debug-entry { border-bottom: 1px solid #222; padding: 4px 0; word-break: break-all; }
    .debug-entry .type { color: #ff8; font-weight: bold; }
    .debug-entry .time { color: #666; }
  </style>
</head>
<body>
  <button id="debug-toggle" onclick="document.getElementById('debug-panel').classList.toggle('open')">Debug</button>
  <div id="debug-panel"></div>
  <div id="config">
    <label>API:</label>
    <input name="url" value="http://localhost:3001/api/chat" />
    <label>JWT:</label>
    <input name="jwt" placeholder="Paste crossmint-jwt here" />
    <label>Refresh:</label>
    <input name="refresh" placeholder="refresh token (optional)" style="width:260px" />
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="prompt" placeholder="Type a message..." autofocus />
    <button id="send">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const debugPanel = document.getElementById('debug-panel');
    const conversation = []; // {role, content}
    let sessionId = null;

    function debugLog(type, data) {
      const entry = document.createElement('div');
      entry.className = 'debug-entry';
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="time">${time}</span> <span class="type">${type}</span><br>${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}`;
      debugPanel.prepend(entry);
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = promptEl.value.trim();
      if (!text) return;

      const jwt = document.querySelector('input[name="jwt"]').value.trim();
      const refresh = document.querySelector('input[name="refresh"]').value.trim();
      const url = document.querySelector('input[name="url"]').value.trim();

      if (!jwt) { addMsg('error', 'Paste your crossmint-jwt first'); return; }

      promptEl.value = '';
      sendBtn.disabled = true;
      addMsg('user', text);

      conversation.push({ role: 'user', content: text });

      const body = { messages: conversation };
      if (sessionId) body.sessionId = sessionId;

      try {
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwt}` };
        if (refresh) headers['X-Refresh-Token'] = refresh;
        const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });

        // Grab session ID from header
        const sid = res.headers.get('X-Session-Id');
        if (sid) {
          sessionId = sid;
          addMsg('system', `Session: ${sid}`);
        }

        if (!res.ok) {
          const err = await res.text();
          addMsg('error', `HTTP ${res.status}: ${err}`);
          sendBtn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let assistantDiv = null;
        let assistantText = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') continue;

            try {
              const evt = JSON.parse(raw);
              // Log all non-text-delta events to debug panel
              if (evt.type !== 'text-delta') debugLog(evt.type, evt);

              if (evt.type === 'start-step') {
                // New step — reset so text goes into a fresh bubble
                if (assistantText) {
                  conversation.push({ role: 'assistant', content: assistantText });
                  assistantText = '';
                }
                assistantDiv = null;
              }

              if (evt.type === 'text-delta') {
                if (!assistantDiv) assistantDiv = addMsg('assistant', '');
                assistantText += evt.delta;
                assistantDiv.textContent = assistantText;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }

              if (evt.type === 'tool-call') {
                addMsg('tool', `Tool: ${evt.toolName}\n${JSON.stringify(evt.args, null, 2)}`);
              }

              if (evt.type === 'tool-result') {
                const preview = JSON.stringify(evt.result, null, 2);
                addMsg('tool', `Result (${evt.toolName}):\n${preview.slice(0, 2000)}${preview.length > 2000 ? '...' : ''}`);
              }

              if (evt.type === 'error') {
                addMsg('error', evt.errorText || JSON.stringify(evt));
              }

              if (evt.type === 'finish') {
                // done
              }
            } catch {}
          }
        }

        if (assistantText) {
          conversation.push({ role: 'assistant', content: assistantText });
        }
      } catch (err) {
        addMsg('error', `Fetch error: ${err.message}`);
      }

      sendBtn.disabled = false;
      promptEl.focus();
    }

    sendBtn.addEventListener('click', send);
    promptEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
